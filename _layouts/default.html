<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    {% seo %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0d1117;
        --accent: #00e5a0;
        --muted: #5a6b82;
        --mono: 'JetBrains Mono', monospace;
        --sans: 'Inter', -apple-system, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--bg);
        font-family: var(--sans);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .landing {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px;
        gap: 6px;
        user-select: none;
        -webkit-user-select: none;
      }
      canvas#logo { display: none; }
      .wordmark {
        font-family: var(--mono);
        font-weight: 700;
        letter-spacing: 10px;
        color: var(--accent);
        text-transform: uppercase;
        line-height: 1;
        white-space: nowrap;
      }
      .tagline {
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 4px;
        text-transform: uppercase;
        line-height: 1;
        white-space: nowrap;
      }
      @media (max-width: 700px) {
        .tagline { font-size: 1.8vw; letter-spacing: 0.5vw; }
      }
      @media (max-width: 600px) {
        .wordmark { font-size: 30px; letter-spacing: 5px; }
        .tagline  { font-size: 10px; letter-spacing: 2px; }
      }
    </style>
  </head>
  <body>
    <div class="landing">
      <canvas id="logo" width="240" height="216" style="display:none;"></canvas>
      <div class="wordmark">MOZENT<span style="font-size:1.18em;vertical-align:0.04em;">&#x25B3;</span>I</div>
      <div class="tagline">CyberSec Specialists, Hackers @ Work</div>
    </div>

    <script>
      document.fonts.ready.then(function () {
        var wm  = document.querySelector('.wordmark');
        var tag = document.querySelector('.tagline');
        var target = tag.offsetWidth;
        var size = 40;
        wm.style.fontSize = size + 'px';
        while (wm.offsetWidth < target && size < 300) {
          size += 0.5;
          wm.style.fontSize = size + 'px';
        }
        while (wm.offsetWidth > target && size > 10) {
          size -= 0.5;
          wm.style.fontSize = size + 'px';
        }
      });
    </script>
  </body>
</html>
